<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional AI Core</title>
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Square AI Face Screen */
        #ai-face-screen { width: 300px; height: 300px; border: 3px solid #00ffcc; margin: 20px; background: #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #00ffcc; }
        
        /* Chat Section */
        #chat-container { width: 90%; max-width: 500px; }
        #chat-box { width: 100%; height: 150px; background: #1a1a1a; color: white; padding: 10px; border: 1px solid #333; overflow-y: auto; margin-bottom: 10px; }
        .controls { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; background: #222; color: white; border: 1px solid #444; }
        button { padding: 10px 15px; cursor: pointer; background: #00ffcc; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Emotional AI Controller</h2>
    <div id="ai-face-screen">
        <p>AI Emotion Face</p>
    </div>

    <div id="chat-container">
        <div id="chat-box"></div>
        <div class="controls">
            <input type="text" id="userInput" placeholder="Message...">
            <button onclick="handleChat()">Send</button>
            <button onclick="uploadFile()">+</button>
        </div>
    </div>

    <script>
        function handleChat() {
            let input = document.getElementById("userInput").value;
            let chatBox = document.getElementById("chat-box");
            
            if(input === "Rounak@7573") {
                chatBox.innerHTML += "<p><b>System:</b> Control Panel Unlocked!</p>";
            } else {
                chatBox.innerHTML += "<p><b>You:</b> " + input + "</p>";
                // Yahan Gemini API call logic aayega
            }
            document.getElementById("userInput").value = "";
        }
        
        function uploadFile() {
            alert("File/Image upload system connected!");
        }
    </script>
</body>
</html>
