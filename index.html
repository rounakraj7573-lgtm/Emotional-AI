<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nexus Portal</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #050508; color: white; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #app { width: 100%; max-width: 500px; height: 90vh; background: #0f0f14; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #333; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; }
        #input-area { padding: 15px; background: #1a1a26; display: flex; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #00f2fe; border: none; border-radius: 5px; margin-left: 10px; cursor: pointer; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; }
        .user { background: #7b2cbf; align-self: flex-end; }
        .ai { background: #222; }
    </style>
</head>
<body>

<div id="app">
    <div id="chat-window">
        <div class="msg ai">Main ready hoon. Kya poochna hai? (Admin access: rounak7573)</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Kuch likho...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    function sendMessage() {
        let input = document.getElementById('user-input');
        let msg = input.value.trim();
        if(!msg) return;

        // Admin Access Logic
        if(msg === "rounak7573") {
            alert("Admin Panel Unlocked!");
            input.value = "";
            return;
        }

        // Add User Message
        let chat = document.getElementById('chat-window');
        chat.innerHTML += `<div class="msg user">${msg}</div>`;

        // AI Response Logic
        setTimeout(() => {
            let response = "Hmm, main samajh gayi: " + msg;
            chat.innerHTML += `<div class="msg ai">${response}</div>`;
            
            // Voice
            let utter = new SpeechSynthesisUtterance(response);
            window.speechSynthesis.speak(utter);
            
            chat.scrollTop = chat.scrollHeight;
        }, 500);

        input.value = "";
    }
</script>
</body>
</html>
