<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emotional AI</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #ai-face { width: 300px; height: 300px; border: 2px solid #00ffcc; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        #chat-box { width: 100%; max-width: 400px; height: 200px; background: #222; overflow-y: auto; padding: 10px; border: 1px solid #444; }
        .input-area { margin-top: 10px; width: 100%; max-width: 400px; display: flex; }
        input { flex: 1; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h2>Emotional AI</h2>
    <div id="ai-face">AI Face</div>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Kuch likhiye...">
        <button onclick="runAI()">Send</button>
    </div>

    <script>
        async function runAI() {
            let input = document.getElementById("userInput").value;
            let chatBox = document.getElementById("chat-box");
            if (!input) return;

            chatBox.innerHTML += `<p>You: ${input}</p>`;
            
            try {
                const res = await fetch('/api/chat', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: input })
                });
                const data = await res.json();
                chatBox.innerHTML += `<p>AI: ${data.reply}</p>`;
            } catch (err) {
                chatBox.innerHTML += `<p style='color:red;'>Error: Connection failed.</p>`;
            }
            document.getElementById("userInput").value = "";
        }
    </script>
</body>
</html>
