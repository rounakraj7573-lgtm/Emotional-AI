<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional AI Interface</title>
    <style>
        body { background-color: #000; color: #00ffcc; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h2 { margin-top: 10px; }
        #ai-face-screen { width: 300px; height: 300px; border: 3px solid #00ffcc; margin: 20px; background: #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #00ffcc; }
        #chat-container { width: 90%; max-width: 500px; }
        #chat-box { width: 100%; height: 200px; background: #1a1a1a; color: white; padding: 10px; border: 1px solid #333; overflow-y: auto; margin-bottom: 10px; border-radius: 5px; }
        .input-area { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; }
        button { padding: 10px 15px; cursor: pointer; background: #00ffcc; border: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>Emotional AI Controller</h2>
    <div id="ai-face-screen">
        <p>AI Emotion Face</p>
    </div>

    <div id="chat-container">
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Kuch message likhiye...">
            <button onclick="handleChat()">Send</button>
        </div>
    </div>

    <script>
        // YAHAN APNI API KEY DALEIN
        const API_KEY = " ";

        async function handleChat() {
            let inputField = document.getElementById("userInput");
            let chatBox = document.getElementById("chat-box");
            let input = inputField.value;

            if (!input) return;

            // Password check
            if (input === "Rounak@7573") {
                chatBox.innerHTML += "<p><b>System:</b> Control Panel Unlocked!</p>";
            } else {
                chatBox.innerHTML += "<p><b>You:</b> " + input + "</p>";
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                    });
                    
                    const data = await response.json();
                    const aiText = data.candidates[0].content.parts[0].text;
                    chatBox.innerHTML += "<p><b>AI:</b> " + aiText + "</p>";
                } catch (e) {
                    chatBox.innerHTML += "<p style='color:red;'><b>Error:</b> API Key check karein.</p>";
                }
            }
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight; // Auto scroll
        }
    </script>
</body>
</html>
